# Lean macOS build for the Auracle IDE fork.
#
# The upstream run_bundling.yml builds Linux + macOS + Windows on custom
# Namespace/self-hosted runners that don't exist on this fork. This workflow
# builds ONLY the macOS (Apple Silicon) .dmg on a GitHub-hosted macos-14
# runner (which ships full Xcode, so the Metal shader compiler is present).
#
# No signing/notarization secrets are configured here, so script/bundle-mac
# degrades to an ad-hoc-signed (unsigned) .dmg automatically. First launch:
# right-click the app > Open to clear Gatekeeper. A signed/notarized public
# build needs an Apple Developer cert + notarization secrets (not required
# for internal builds).
name: Build Auracle IDE (macOS)

# Manual trigger only — Mac CI minutes are expensive, so we dispatch this
# deliberately (gh workflow run / the Actions "Run workflow" button) rather
# than on every push.
on:
  workflow_dispatch:

jobs:
  bundle_mac_aarch64:
    runs-on: macos-14
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          clean: false
      - name: Setup Node (dmg-license needs it)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
      # Zed's vendored webrtc-sys C++ bridge (cxx) does not compile against the
      # stricter libc++ in macOS SDK 14.4+ (Xcode 15.3/15.4). Pin the newest
      # Xcode whose SDK is <= 14.2 (Xcode <= 15.2), where it builds cleanly.
      # Metal ships with every Xcode, so the shader compile is unaffected.
      - name: Select an Xcode with SDK <= 14.2 (webrtc-sys/cxx)
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode*.app || true
          best=""
          for app in /Applications/Xcode_15.2*.app /Applications/Xcode_15.1*.app \
                     /Applications/Xcode_15.0*.app /Applications/Xcode_14*.app; do
            if [ -d "$app" ]; then best="$app"; break; fi
          done
          if [ -n "$best" ]; then
            sudo xcode-select -s "$best/Contents/Developer"
            echo "Selected $best"
          else
            echo "WARNING: no Xcode <= 15.2 found; using default $(xcode-select -p)"
          fi
          echo "SDK: $(xcrun --show-sdk-version)"
          xcrun -f metal && echo "metal OK"
      - name: Bundle macOS app (aarch64, unsigned)
        run: ./script/bundle-mac aarch64-apple-darwin
      - name: Upload .dmg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Auracle-IDE-aarch64-dmg
          path: target/aarch64-apple-darwin/release/Zed-aarch64.dmg
          if-no-files-found: error
